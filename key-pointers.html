<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Pointers — AB-900 Study Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📌</text></svg>">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">AB-900 Study Hub</a>
      <button id="hamburger" class="hamburger" aria-label="Menu">☰</button>
      <nav id="nav" class="nav">
        <a href="index.html">Home</a>
        <a href="study-guide.html">Study Guide</a>
        <a href="flashcards.html">Flashcards</a>
        <a href="key-pointers.html" class="active">Key Pointers</a>
        <a href="key-concepts.html">Key Concepts</a>
      </nav>
      <div class="search-box" id="searchBox">
        <span>🔍</span>
        <input id="searchInput" type="text" placeholder="Search all content...">
        <div id="searchResults" class="search-dropdown"></div>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙 Dark</button>
    </div>
  </header>

  <div class="container">
    <h1>Key Pointers</h1>
    <p class="searchable">Quick reference &mdash; all essential AB-900 facts in one place. Study priority: spend ~35&ndash;40% of your prep time on <strong>Domain 2</strong> (data protection &amp; governance).</p>
    <div style="margin-bottom:1.25rem;">
      <select id="moduleFilter" style="padding:0.4rem 0.75rem;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:0.9rem;">
        <option value="">All modules</option>
      </select>
    </div>
    <div id="pointersContent"></div>
  </div>

  <script src="data/modules.js"></script>
  <script src="data/key-pointers.js"></script>
  <script>
    const keyPointerModuleMap = {
      "zero-trust-identity": "m1",
      "identity-types-entra": "m1",
      "mfa-signin": "m1",
      "conditional-access": "m1",
      "rbac-pim-jea-jit": { main: "m1", also: "m2" },
      "identity-secure-score": "m1",
      "defender-xdr": "m1",
      "m365-core-services": "m2",
      "m365-admin-center": "m2",
      "microsoft-purview": "m3",
      "sharepoint-governance": "m3",
      "m365-copilot": "m4",
      "agents": "m4",
      "work-iq-safety": "m4",
      "licensing": "m5",
      "adoption-rollout": "m5",
      "responsible-ai": "m4",
      "hybrid-identity": "m1",
      "intune": "m1",
      "agent-creation-management": "m6",
      "numbers": null
    };

    function getPointerModuleId(catId) {
      const v = keyPointerModuleMap[catId];
      if (!v) return null;
      if (typeof v === 'string') return v;
      return v.main;
    }

    const container = document.getElementById('pointersContent');
    const moduleFilter = document.getElementById('moduleFilter');
    const fragment = document.createDocumentFragment();

    // Populate module filter
    examDomains.forEach((d, dIdx) => {
      d.modules.forEach(mod => {
        const opt = document.createElement('option');
        opt.value = mod.id;
        opt.textContent = 'Domain ' + (dIdx + 1) + ' (' + d.weight + '): ' + d.shortTitle + ' \u2192 ' + mod.title;
        moduleFilter.appendChild(opt);
      });
    });

    var domainAccentColors = { d1: '#4a90d9', d2: '#e67e22', d3: '#2ecc71' };

    keyPointerCategories.forEach(function(cat) {
      var modId = getPointerModuleId(cat.id);
      var dom = null;
      if (modId) dom = getDomainForModule(modId);
      var accent = (dom && domainAccentColors[dom.id]) || '#2563eb';

      var group = document.createElement('div');
      group.className = 'key-pointer-group searchable';
      if (modId) group.dataset.module = modId;

      var header = document.createElement('div');
      header.className = 'key-pointer-group-header';
      header.setAttribute('onclick', 'togglePointerGroup(this)');

      var h2 = document.createElement('h2');
      h2.id = cat.id;
      h2.style.borderLeft = '3px solid ' + accent;
      h2.style.paddingLeft = '0.6rem';
      if (modId) {
        h2.innerHTML = getModuleBadgeHtml(modId) + ' ' + cat.title;
      } else {
        h2.innerHTML = cat.title;
      }

      var chevron = document.createElement('span');
      chevron.className = 'chevron open';
      chevron.textContent = '\u25B6';

      header.appendChild(h2);
      header.appendChild(chevron);

      var body = document.createElement('div');
      body.className = 'key-pointer-group-body open';

      var ul = document.createElement('ul');
      cat.pointers.forEach(function(p) {
        var li = document.createElement('li');
        li.innerHTML = p;
        ul.appendChild(li);
      });
      body.appendChild(ul);

      group.appendChild(header);
      group.appendChild(body);
      fragment.appendChild(group);
    });

    container.appendChild(fragment);

    // Handle hash after rendering
    if (location.hash) {
      var h2 = document.getElementById(location.hash.replace('#',''));
      if (h2) {
        var group = h2.closest('.key-pointer-group');
        if (group) {
          group.querySelector('.key-pointer-group-body').classList.add('open');
          group.querySelector('.chevron').classList.add('open');
        }
        setTimeout(function() { h2.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
      }
    }

    function applyPointerFilters(q) {
      const modVal = moduleFilter.value;
      document.querySelectorAll('.key-pointer-group').forEach(group => {
        let modMatch = !modVal;
        if (modVal) {
          const groupMod = group.dataset.module;
          if (groupMod === modVal) {
            modMatch = true;
          } else {
            const catId = group.querySelector('h2').id;
            const v = keyPointerModuleMap[catId];
            if (v && typeof v === 'object' && v.main === modVal) modMatch = true;
            if (v && typeof v === 'object' && v.also === modVal) modMatch = true;
          }
        }
        const textMatch = !q || group.textContent.toLowerCase().includes(q);
        group.style.display = (modMatch && textMatch) ? '' : 'none';
      });
    }

    function togglePointerGroup(el) {
      var body = el.nextElementSibling;
      var chevron = el.querySelector('.chevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    }

    moduleFilter.addEventListener('change', function() {
      const input = document.getElementById('searchInput');
      if (input && window.pageSearch) {
        window.pageSearch(input.value.toLowerCase().trim());
      } else {
        applyPointerFilters('');
      }
    });

    window.pageSearch = function(q) {
      applyPointerFilters(q);
    };
  </script>
  <script>
    window.addEventListener('hashchange', function() {
      if (location.hash) {
        var h2 = document.getElementById(location.hash.replace('#',''));
        if (h2) {
          var group = h2.closest('.key-pointer-group');
          if (group) {
            group.querySelector('.key-pointer-group-body').classList.add('open');
            group.querySelector('.chevron').classList.add('open');
          }
          setTimeout(function() { h2.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
        }
      }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
