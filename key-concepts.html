<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Concepts — AB-900 Study Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">AB-900 Study Hub</a>
      <button id="hamburger" class="hamburger" aria-label="Menu">☰</button>
      <nav id="nav" class="nav">
        <a href="index.html">Home</a>
        <a href="study-guide.html">Study Guide</a>
        <a href="flashcards.html">Flashcards</a>
        <a href="key-pointers.html">Key Pointers</a>
        <a href="key-concepts.html" class="active">Key Concepts</a>
      </nav>
      <div class="search-box" id="searchBox">
        <span>🔍</span>
        <input id="searchInput" type="text" placeholder="Search all content...">
        <div id="searchResults" class="search-dropdown"></div>
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙 Dark</button>
    </div>
  </header>

  <div class="container">
    <h1>Key Concepts by Domain</h1>
    <p>Explanations of each key concept tested on the AB-900 exam, organized by exam domain.</p>

    <div id="conceptsContent"></div>
  </div>

  <script src="data/modules.js"></script>
  <script src="data/key-concepts.js"></script>
  <script>
    (function() {
      var container = document.getElementById('conceptsContent');
      var domainColors = { d1: '#4a90d9', d2: '#e67e22', d3: '#2ecc71' };
      var domainIcons = { d1: '\uD83D\uDD10', d2: '\uD83D\uDEE1\uFE0F', d3: '\uD83E\uDD16' };
      var html = '';

      keyConceptsByDomain.forEach(function(d) {
        var color = domainColors[d.domain] || '#2563eb';
        html += '<div class="concept-domain" id="' + d.domain + '" data-domain="' + d.domain + '">';
        html += '<div class="concept-domain-header" onclick="toggleDomain(this)">';
        html += '<h2 style="border-left:3px solid ' + color + ';padding-left:0.6rem;">' + domainIcons[d.domain] + ' ' + d.title + ' <span class="weight-badge">' + d.concepts.length + ' concepts</span></h2>';
        html += '<span class="chevron">\u25B6</span>';
        html += '</div>';
        html += '<div class="concept-domain-body open">';
        html += '<div class="concept-grid">';

        d.concepts.forEach(function(c) {
          html += '<div class="concept-card">';
          html += '<div class="concept-term" style="color:' + color + ';">' + c.term + '</div>';
          html += '<div class="concept-expl">' + c.explanation + '</div>';
          html += '</div>';
        });

        html += '</div></div></div>';
      });

      container.innerHTML = html;

      // Handle hash after rendering
      if (location.hash) {
        var target = document.getElementById(location.hash.replace('#',''));
        if (target) {
          target.querySelector('.concept-domain-body').classList.add('open');
          target.querySelector('.chevron').classList.add('open');
          setTimeout(function() { target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
        }
      }
    })();

    function toggleDomain(el) {
      var body = el.nextElementSibling;
      var chevron = el.querySelector('.chevron');
      body.classList.toggle('open');
      chevron.classList.toggle('open');
    }
  </script>
  <script>
    window.addEventListener('hashchange', function() {
      if (location.hash) {
        var target = document.getElementById(location.hash.replace('#',''));
        if (target) {
          target.querySelector('.concept-domain-body').classList.add('open');
          target.querySelector('.chevron').classList.add('open');
          setTimeout(function() { target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
        }
      }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
