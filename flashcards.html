<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — AB-900 Study Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">AB-900 Study Hub</a>
      <button id="hamburger" class="hamburger" aria-label="Menu">☰</button>
      <nav id="nav" class="nav">
        <a href="index.html">Home</a>
        <a href="study-guide.html">Study Guide</a>
        <a href="flashcards.html" class="active">Flashcards</a>
        <a href="key-pointers.html">Key Pointers</a>
      </nav>
      <div class="search-box">
        <span>🔍</span>
        <input id="searchInput" type="text" placeholder="Search...">
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙 Dark</button>
    </div>
  </header>

  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.75rem; margin-bottom:1rem;">
      <h1 style="margin:0;">Flashcards</h1>
      <div class="flashcard-controls">
        <select id="categoryFilter">
          <option value="all">All Categories</option>
        </select>
        <select id="moduleFilter">
          <option value="">All modules</option>
        </select>
        <button id="shuffleBtn" class="theme-toggle">🔀 Shuffle</button>
        <button id="showAllBtn" class="theme-toggle">👁️ Show Answers</button>
      </div>
    </div>

    <div id="cardCounter" class="card-counter">Card 1 / 1</div>

    <div class="flashcard-wrap">
      <div class="flashcard-3d" id="flashcard3d">
        <div class="flashcard-face flashcard-front">
          <div class="card-category" id="cardCategory"></div>
          <div class="card-question" id="questionText"></div>
          <div class="card-ref" id="cardReference"></div>
          <div class="card-flip-prompt">Click card to reveal answer</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="card-answer" id="answerText"></div>
          <div class="card-explanation" id="explanationBox"></div>
          <div id="backLinks" class="card-ref"></div>
          <div class="card-flip-prompt">Click to flip back</div>
        </div>
      </div>
    </div>

    <div class="flashcard-nav">
      <button id="prevBtn" class="theme-toggle">⬅ Previous</button>
      <span class="card-progress">
        <span id="progressCurrent">1</span> / <span id="progressTotal">1</span>
        <span id="progressLabel" class="progress-label"></span>
      </span>
      <button id="nextBtn" class="theme-toggle">Next ➡</button>
    </div>

    <div id="showAnswersPanel" class="show-answers-panel">
      <h2>All Answers</h2>
      <div id="answersList"></div>
    </div>
  </div>

  <script src="data/modules.js"></script>
  <script src="data/flashcards.js"></script>
  <script>
    let currentIndex = 0;
    let filteredCards = [...flashcards];
    let shuffled = false;

    const flashcardModuleMap = {
      "Exam basics": null,
      "Zero Trust & identity": "m1",
      "Identity types in Entra": "m1",
      "MFA & sign-in methods": "m1",
      "Conditional Access": "m1",
      "RBAC, PIM, JEA, JIT": "m1",
      "Identity Secure Score & audit": "m1",
      "Defender XDR": "m1",
      "M365 core services": "m2",
      "Microsoft 365 admin center": "m2",
      "Microsoft Purview": "m3",
      "SharePoint governance": "m3",
      "Microsoft 365 Copilot": "m4",
      "Agents": "m4",
      "Work IQ, content safety, groundedness": "m4",
      "Licensing": "m5",
      "Adoption & rollout": "m5",
      "Responsible AI": "m4",
      "Hybrid identity": "m1",
      "Intune": "m1",
      "Numbers to remember": null
    };

    const $ = id => document.getElementById(id);
    const categoryFilter = $('categoryFilter');
    const moduleFilter = $('moduleFilter');
    const cardCounter = $('cardCounter');
    const flashcard3d = $('flashcard3d');
    const questionText = $('questionText');
    const cardCategory = $('cardCategory');
    const answerText = $('answerText');
    const explanationBox = $('explanationBox');
    const backLinks = $('backLinks');
    const cardRef = $('cardReference');
    const prevBtn = $('prevBtn');
    const nextBtn = $('nextBtn');
    const showAllBtn = $('showAllBtn');
    const answersList = $('answersList');
    const showPanel = $('showAnswersPanel');
    const shuffleBtn = $('shuffleBtn');
    const progressCurrent = $('progressCurrent');
    const progressTotal = $('progressTotal');
    const progressLabel = $('progressLabel');

    // Populate category filter
    flashcardCategories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      categoryFilter.appendChild(opt);
    });

    // Populate module filter
    learningPaths.forEach((lp, lpIndex) => {
      lp.modules.forEach(mod => {
        const opt = document.createElement('option');
        opt.value = mod.id;
        opt.textContent = 'LP' + (lpIndex + 1) + ': ' + lp.title + ' \u2192 ' + mod.title;
        moduleFilter.appendChild(opt);
      });
    });

    // Card flip
    flashcard3d.addEventListener('click', () => {
      flashcard3d.classList.toggle('flipped');
    });

    let searchQuery = '';

    function applyFilters() {
      const cat = categoryFilter.value;
      const modVal = moduleFilter.value;
      let cards = cat === 'all' ? [...flashcards] : flashcards.filter(c => c.category === cat);
      if (modVal) {
        cards = cards.filter(c => flashcardModuleMap[c.category] === modVal);
      }
      if (shuffled) cards.sort(() => 0.5 - Math.random());
      if (searchQuery) {
        cards = cards.filter(c =>
          c.question.toLowerCase().includes(searchQuery) ||
          c.answer.toLowerCase().includes(searchQuery) ||
          c.category.toLowerCase().includes(searchQuery) ||
          (c.reference && c.reference.toLowerCase().includes(searchQuery))
        );
      }
      filteredCards = cards;
      currentIndex = 0;
      renderCard();
    }

    window.pageSearch = function(q) { searchQuery = q; applyFilters(); };

    categoryFilter.addEventListener('change', applyFilters);
    moduleFilter.addEventListener('change', applyFilters);

    shuffleBtn.addEventListener('click', () => {
      shuffled = !shuffled;
      shuffleBtn.style.opacity = shuffled ? '1' : '0.6';
      applyFilters();
    });

    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; renderCard(); }
    });
    nextBtn.addEventListener('click', () => {
      if (currentIndex < filteredCards.length - 1) { currentIndex++; renderCard(); }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; renderCard(); }
      if (e.key === 'ArrowRight' && currentIndex < filteredCards.length - 1) { currentIndex++; renderCard(); }
    });

    function renderCard() {
      const card = filteredCards[currentIndex];
      flashcard3d.classList.remove('flipped');

      if (!card || filteredCards.length === 0) {
        cardCounter.textContent = 'No cards match your filters';
        questionText.textContent = '';
        cardRef.innerHTML = '';
        backLinks.innerHTML = '';
        explanationBox.classList.remove('visible');
        answerText.textContent = '';
        progressCurrent.textContent = '0';
        progressTotal.textContent = '0';
        progressLabel.textContent = '';
        return;
      }

      cardCounter.textContent = 'Showing ' + filteredCards.length + ' of ' + flashcards.length + ' cards';
      progressCurrent.textContent = currentIndex + 1;
      progressTotal.textContent = filteredCards.length;
      progressLabel.textContent = 'Card ' + (currentIndex + 1) + ' of ' + filteredCards.length;

      // Front — question
      questionText.textContent = card.question;
      const modId = flashcardModuleMap[card.category];
      if (modId) {
        cardCategory.innerHTML = getModuleBadgeHtml(modId) + ' ' + card.category;
      } else {
        cardCategory.textContent = card.category;
      }

      // Front — reference
      let refHtml = '';
      if (card.reference) {
        refHtml += '<span>📚 ' + card.reference + '</span>';
      }
      if (card.learnLink) {
        refHtml += ' &middot; <a href="' + card.learnLink + '" target="_blank" rel="noopener">📖 Learn more</a>';
      }
      cardRef.innerHTML = refHtml;

      // Back — answer + explanation
      answerText.textContent = card.answer;

      const cardLabel = findUnit(card.unitId);
      let backRefHtml = '';
      if (cardLabel) {
        const mod = findModule(card.moduleId);
        const lp = getLearningPathForModule(card.moduleId);
        if (lp && mod) {
          backRefHtml += '<span>📚 ' + lp.title + ' → ' + mod.title + ' → ' + cardLabel.title + '</span>';
        }
      } else if (card.reference) {
        backRefHtml += '<span>📚 ' + card.reference + '</span>';
      }
      if (card.learnLink) {
        backRefHtml += ' &middot; <a href="' + card.learnLink + '" target="_blank" rel="noopener">📖 Learn more</a>';
      }
      backLinks.innerHTML = backRefHtml;

      if (card.explanation) {
        explanationBox.innerHTML = '<strong>Explanation:</strong> ' + card.explanation;
        explanationBox.classList.add('visible');
      } else {
        explanationBox.classList.remove('visible');
      }
    }

    // Show All Answers
    showAllBtn.addEventListener('click', () => {
      const isOpen = showPanel.classList.toggle('open');
      showAllBtn.textContent = isOpen ? '🙈 Hide Answers' : '👁️ Show Answers';
      if (!isOpen) return;

      const cat = categoryFilter.value;
      const cards = cat === 'all' ? flashcards : flashcards.filter(c => c.category === cat);
      answersList.innerHTML = cards.map(c => `
        <div class="show-answers-item">
          <q>${c.question}</q>
          <div class="answer">${c.answer}</div>
          ${c.explanation ? '<div class="explanation">' + c.explanation + '</div>' : ''}
          ${c.reference ? '<div class="explanation">📚 ' + c.reference + '</div>' : ''}
        </div>
      `).join('');
    });

    renderCard();
  </script>
  <script src="script.js"></script>
</body>
</html>
