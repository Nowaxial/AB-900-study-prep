<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards — AB-900 Study Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="header-logo">AB-900 Study Hub</a>
      <button id="hamburger" class="hamburger" aria-label="Menu">☰</button>
      <nav id="nav" class="nav">
        <a href="index.html">Home</a>
        <a href="study-guide.html">Study Guide</a>
        <a href="flashcards.html" class="active">Flashcards</a>
        <a href="key-pointers.html">Key Pointers</a>
      </nav>
      <div class="search-box">
        <span>🔍</span>
        <input id="searchInput" type="text" placeholder="Search...">
      </div>
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙 Dark</button>
    </div>
  </header>

  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.75rem; margin-bottom:1rem;">
      <h1 style="margin:0;">Flashcards</h1>
      <div class="flashcard-controls">
        <select id="categoryFilter">
          <option value="all">All Categories</option>
        </select>
        <button id="shuffleBtn" class="theme-toggle">🔀 Shuffle</button>
        <button id="modeToggle" class="theme-toggle">🎯 Quiz Mode</button>
        <button id="showAllBtn" class="theme-toggle">👁️ Show Answers</button>
      </div>
    </div>

    <div id="cardCounter">Card 1 / 1</div>

    <div class="flashcard-wrap">
      <div class="card" id="cardContainer">
        <div id="cardCategory" style="font-size:0.8rem; color:var(--primary); font-weight:600; margin-bottom:0.25rem;"></div>
        <div class="flashcard-question" id="questionText"></div>

        <div id="cardReference" class="card-ref"></div>

        <div id="optionsContainer" class="flashcard-options"></div>

        <div id="dragContainer" class="drag-reveal-container" style="display:none;">
          <div class="drag-reveal-answer" id="dragAnswer"></div>
          <div class="drag-reveal-cover" id="dragCover">↓ Drag to reveal answer ↓</div>
        </div>

        <div class="explanation-box" id="explanationBox"></div>
      </div>
    </div>

    <div style="display:flex; gap:0.75rem; justify-content:center; margin-top:1.25rem; flex-wrap:wrap;">
      <button id="prevBtn" class="theme-toggle" style="min-width:100px;">⬅ Previous</button>
      <button id="nextBtn" class="theme-toggle" style="min-width:100px;">Next ➡</button>
    </div>

    <div id="showAnswersPanel" class="show-answers-panel">
      <h2>All Answers</h2>
      <div id="answersList"></div>
    </div>
  </div>

  <script src="data/flashcards.js"></script>
  <script>
    let currentIndex = 0;
    let filteredCards = [...flashcards];
    let mode = 'quiz';
    let shuffled = false;

    const categoryFilter = document.getElementById('categoryFilter');
    const cardCounter = document.getElementById('cardCounter');
    const questionText = document.getElementById('questionText');
    const cardCategory = document.getElementById('cardCategory');
    const optionsContainer = document.getElementById('optionsContainer');
    const dragContainer = document.getElementById('dragContainer');
    const dragAnswer = document.getElementById('dragAnswer');
    const dragCover = document.getElementById('dragCover');
    const explanationBox = document.getElementById('explanationBox');
    const cardRef = document.getElementById('cardReference');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const showAllBtn = document.getElementById('showAllBtn');
    const answersList = document.getElementById('answersList');
    const showPanel = document.getElementById('showAnswersPanel');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const modeToggle = document.getElementById('modeToggle');

    // Populate category filter
    flashcardCategories.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      categoryFilter.appendChild(opt);
    });

    let searchQuery = '';

    function applyFilters() {
      const cat = categoryFilter.value;
      let cards = cat === 'all' ? [...flashcards] : flashcards.filter(c => c.category === cat);
      if (shuffled) cards.sort(() => 0.5 - Math.random());
      if (searchQuery) {
        cards = cards.filter(c =>
          c.question.toLowerCase().includes(searchQuery) ||
          c.answer.toLowerCase().includes(searchQuery) ||
          c.category.toLowerCase().includes(searchQuery) ||
          (c.reference && c.reference.toLowerCase().includes(searchQuery))
        );
      }
      filteredCards = cards;
      currentIndex = 0;
      renderCard();
    }

    window.pageSearch = function(q) { searchQuery = q; applyFilters(); };

    // Filter
    categoryFilter.addEventListener('change', applyFilters);

    // Shuffle
    shuffleBtn.addEventListener('click', () => {
      shuffled = !shuffled;
      shuffleBtn.style.opacity = shuffled ? '1' : '0.6';
      applyFilters();
    });

    // Mode toggle
    modeToggle.addEventListener('click', () => {
      mode = mode === 'quiz' ? 'reveal' : 'quiz';
      modeToggle.textContent = mode === 'quiz' ? '🎯 Quiz Mode' : '🖐️ Reveal Mode';
      renderCard();
    });

    // Navigation
    prevBtn.addEventListener('click', () => {
      if (currentIndex > 0) { currentIndex--; renderCard(); }
    });
    nextBtn.addEventListener('click', () => {
      if (currentIndex < filteredCards.length - 1) { currentIndex++; renderCard(); }
    });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; renderCard(); }
      if (e.key === 'ArrowRight' && currentIndex < filteredCards.length - 1) { currentIndex++; renderCard(); }
    });

    // Drag-to-reveal
    function setupDragReveal() {
      let isDragging = false;
      let startX = 0;
      let currentX = 0;

      function updateClip(x) {
        const rect = dragContainer.getBoundingClientRect();
        const progress = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
        dragCover.style.clipPath = `inset(0 ${(1 - progress) * 100}% 0 0)`;
      }

      function onStart(e) {
        isDragging = true;
        const point = e.touches ? e.touches[0] : e;
        startX = point.clientX;
        dragCover.style.cursor = 'grabbing';
      }

      function onMove(e) {
        if (!isDragging) return;
        e.preventDefault();
        const point = e.touches ? e.touches[0] : e;
        updateClip(point.clientX);
      }

      function onEnd() {
        isDragging = false;
        dragCover.style.cursor = 'grab';
      }

      dragCover.addEventListener('mousedown', onStart);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      dragCover.addEventListener('touchstart', onStart, { passive: true });
      dragCover.addEventListener('touchmove', onMove, { passive: false });
      dragCover.addEventListener('touchend', onEnd);
    }

    // Check answer
    window.checkAnswer = function(el, correctIndex, selectedIndex) {
      const allOptions = document.querySelectorAll('.flashcard-option');
      allOptions.forEach(o => o.style.pointerEvents = 'none');
      if (selectedIndex === correctIndex) {
        el.classList.add('correct');
      } else {
        el.classList.add('wrong');
        allOptions[correctIndex].classList.add('revealed');
      }
      const card = filteredCards[currentIndex];
      if (card.explanation) {
        explanationBox.innerHTML = '<strong>Explanation:</strong> ' + card.explanation;
        explanationBox.classList.add('visible');
      }
    };

    function renderCard() {
      const card = filteredCards[currentIndex];
      if (!card || filteredCards.length === 0) {
        cardCounter.textContent = 'No cards in this category';
        questionText.textContent = '';
        optionsContainer.innerHTML = '';
        dragContainer.style.display = 'none';
        cardRef.innerHTML = '';
        explanationBox.classList.remove('visible');
        return;
      }

      cardCounter.textContent = `Card ${currentIndex + 1} / ${filteredCards.length} (${card.category})`;
      questionText.textContent = card.question;
      cardCategory.textContent = card.category;

      // Reference + Learn link
      let refHtml = '';
      if (card.reference) {
        refHtml += '<span>📚 ' + card.reference + '</span>';
      }
      if (card.learnLink) {
        refHtml += ' &middot; <a href="' + card.learnLink + '" target="_blank" rel="noopener">📖 Learn more on Microsoft Learn</a>';
      }
      cardRef.innerHTML = refHtml;

      explanationBox.classList.remove('visible');

      if (mode === 'quiz') {
        optionsContainer.style.display = '';
        dragContainer.style.display = 'none';
        if (card.options && card.options.length > 0) {
          optionsContainer.innerHTML = card.options.map((opt, i) =>
            `<div class="flashcard-option" data-index="${i}" onclick="checkAnswer(this, ${card.correctIndex}, ${i})">${opt}</div>`
          ).join('');
        } else {
          optionsContainer.innerHTML = '<p style="color:var(--text-secondary);">No options available. Switch to Reveal mode.</p>';
        }
      } else {
        optionsContainer.style.display = 'none';
        dragContainer.style.display = '';
        dragAnswer.textContent = card.answer;
        dragCover.style.clipPath = 'inset(0 0 0 0)';
        setupDragReveal();
      }

      prevBtn.style.opacity = currentIndex === 0 ? '0.4' : '1';
      nextBtn.style.opacity = currentIndex >= filteredCards.length - 1 ? '0.4' : '1';
    }

    // Show All Answers
    showAllBtn.addEventListener('click', () => {
      const isOpen = showPanel.classList.toggle('open');
      showAllBtn.textContent = isOpen ? '🙈 Hide Answers' : '👁️ Show Answers';
      if (!isOpen) return;

      const cat = categoryFilter.value;
      const cards = cat === 'all' ? flashcards : flashcards.filter(c => c.category === cat);
      answersList.innerHTML = cards.map(c => `
        <div class="show-answers-item">
          <q>${c.question}</q>
          <div class="answer">${c.answer}</div>
          ${c.reference ? '<div class="explanation">📚 ' + c.reference + '</div>' : ''}
          ${c.learnLink ? '<div class="explanation">📖 <a href="' + c.learnLink + '" target="_blank" rel="noopener" style="color:var(--primary);">Learn more on Microsoft Learn</a></div>' : ''}
          ${c.explanation ? '<div class="explanation">' + c.explanation + '</div>' : ''}
        </div>
      `).join('');
    });

    renderCard();
  </script>
  <script src="script.js"></script>
</body>
</html>
